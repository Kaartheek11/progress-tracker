name = "momentum-reminders"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[triggers]
crons = ["*/5 * * * *"]

[vars]
ALLOWED_ORIGIN = "https://kaartheek11.github.io"
# Replace after running `npm run vapid:generate`.
VAPID_PUBLIC_KEY = "REPLACE_WITH_PUBLIC_VAPID_KEY"
VAPID_SUBJECT = "mailto:you@example.com"

[[d1_databases]]
binding = "DB"
database_name = "momentum_reminders"
# Replace with the id returned by `npx wrangler d1 create momentum_reminders`.
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"
